<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Roadmap Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .quiz-container { background-color: #1e1e2f; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .option-btn { width: 100%; text-align: left; margin-bottom: 10px; padding: 15px; background-color: #2a2a40; border: 2px solid #3f3f5a; color: white; border-radius: 10px; transition: 0.3s; }
        .option-btn:hover { background-color: #3f3f5a; transform: translateY(-2px); }
        .option-btn.correct { background-color: #28a745 !important; border-color: #28a745 !important; }
        .option-btn.wrong { background-color: #dc3545 !important; border-color: #dc3545 !important; }
        .stats-box { background-color: #2a2a40; padding: 15px; border-radius: 10px; text-align: center; }
        .progress { height: 25px; background-color: #2a2a40; border-radius: 15px; }
        .progress-bar { background-color: #007bff; font-weight: bold; }
        .achievement-toast { position: fixed; bottom: 20px; right: 20px; z-index: 1050; display: none; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🌱 Python Roadmap Quiz</h1>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-box">
                    <h4>Points: <span id="score" class="text-warning">0</span></h4>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-box">
                    <h4>Streak: <span id="streak" class="text-danger">0</span> 🔥</h4>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-box">
                    <h4>Achievements: <span id="achievementsCount" class="text-info">0</span> 🏆</h4>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="quiz-container">
                    <div class="mb-4">
                        <label>Course Progress</label>
                        <div class="progress">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
                        </div>
                    </div>

                    <div id="quizContent">
                        <h3 id="questionText" class="mb-4">Loading question...</h3>
                        <div id="optionsContainer">
                            </div>
                        <button id="nextBtn" class="btn btn-primary mt-4 w-100" style="display: none;">Next Question</button>
                    </div>

                    <div id="endScreen" style="display: none;" class="text-center">
                        <h2>Quiz Complete! 🎉</h2>
                        <h4 class="mt-3">Final Score: <span id="finalScore" class="text-warning"></span></h4>
                        <p class="mt-3" id="earnedAchievements"></p>
                        <button onclick="location.reload()" class="btn btn-success mt-3">Restart Course</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast achievement-toast bg-info text-white" id="achievementToast">
        <div class="toast-body fs-5">
            🏆 <strong id="toastTitle">Achievement Unlocked!</strong>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let achievements = [];
        let hasAnswered = false;

        // Fetch questions from Python Backend
        fetch('/api/questions')
            .then(res => res.json())
            .then(data => {
                questions = data;
                loadQuestion();
            });

        function loadQuestion() {
            hasAnswered = false;
            document.getElementById('nextBtn').style.display = 'none';
            
            // Update Progress Bar
            let progressPct = Math.round((currentQuestionIndex / questions.length) * 100);
            document.getElementById('progressBar').style.width = progressPct + '%';
            document.getElementById('progressBar').innerText = progressPct + '%';

            if (currentQuestionIndex >= questions.length) {
                showEndScreen();
                return;
            }

            const q = questions[currentQuestionIndex];
            document.getElementById('questionText').innerText = `Q${currentQuestionIndex + 1}: ${q.question}`;
            
            const optionsDiv = document.getElementById('optionsContainer');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q_id = questions[currentQuestionIndex].id;

            // Ask Python backend if answer is correct
            fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: q_id, answer_index: selectedIndex })
            })
            .then(res => res.json())
            .then(data => {
                const buttons = document.querySelectorAll('.option-btn');
                
                if (data.correct) {
                    btnElement.classList.add('correct');
                    streak++;
                    // Base points + streak multiplier
                    let pointsEarned = 10 + (streak * 5);
                    score += pointsEarned;
                    checkAchievements();
                } else {
                    btnElement.classList.add('wrong');
                    buttons[data.correct_index].classList.add('correct');
                    streak = 0;
                }

                updateStats();
                document.getElementById('nextBtn').style.display = 'block';
            });
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            document.getElementById('achievementsCount').innerText = achievements.length;
        }

        function checkAchievements() {
            if (streak === 3 && !achievements.includes("On Fire! 🔥")) {
                unlockAchievement("On Fire! 🔥 (Streak of 3)");
            }
            if (score >= 50 && !achievements.includes("Scholar 📚")) {
                unlockAchievement("Scholar 📚 (Earned 50 points)");
            }
            if (currentQuestionIndex === questions.length - 1 && streak === questions.length && !achievements.includes("Flawless Victory 👑")) {
                unlockAchievement("Flawless Victory 👑 (100% Correct)");
            }
        }

        function unlockAchievement(name) {
            achievements.push(name);
            document.getElementById('toastTitle').innerText = name;
            document.getElementById('achievementToast').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('achievementToast').style.display = 'none';
            }, 3000);
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuestion();
        });

        function showEndScreen() {
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressBar').innerText = '100%';
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
            
            let achText = achievements.length > 0 
                ? "<strong>Achievements Unlocked:</strong><br>" + achievements.join('<br>') 
                : "Keep practicing to unlock achievements!";
            document.getElementById('earnedAchievements').innerHTML = achText;
        }
    </script>
</body>
</html>
